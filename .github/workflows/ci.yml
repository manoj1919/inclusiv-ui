name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pipeline tests
        run: pytest tests/

      - name: Validate processed profiles (schema + semantic)
        run: python -m pipeline.validators.validate_data

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
