name: Annual data refresh

# Runs the full pipeline (scrape → merge → AI enrich → validate) and opens a PR
# with the data diffs. Triggers:
#   - Cron: once per year, mid-December (after CDE typically releases prior SY data)
#   - Manual: workflow_dispatch
#
# Why a PR (not direct push to main): we want a human to eyeball the diff and
# the AI-generated summaries before they ship. AI output drifts and the data
# can have surprise outliers (CDE re-labels columns, etc.).

on:
  schedule:
    - cron: "0 9 15 12 *"  # Dec 15, 09:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Scrape CDE Special Education Program Setting
        run: python -m pipeline.scrapers.cde.spedps

      - name: Scrape CA School Dashboard
        run: python -m pipeline.scrapers.dashboard.cdashboard

      - name: Merge per-source partials into final profiles
        run: python -m pipeline.transformers.merge

      # AI summaries are NOT generated automatically — they're written by
      # Claude in a Claude Code session (free, in-session) and committed
      # separately by the maintainer. This step would no-op without a staged
      # summaries file, which is the intended behavior in CI.
      - name: Stamp any staged AI summaries (no-op if none staged)
        run: python -m pipeline.enrichers.summarize || true

      - name: Validate (schema + semantic checks)
        run: python -m pipeline.validators.validate_data

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: annual refresh"
          title: "Annual data refresh"
          body: |
            Auto-generated from the yearly pipeline run.

            **Human review required** before merge. Spot-check:
              - Any districts that swung dramatically year-over-year
              - AI summaries for accuracy and tone (the disclaimer is non-negotiable)
              - Schema additions / new fields

            See `docs/methodology.md` for source priority and provenance rules.
          branch: data-refresh
          add-paths: |
            data/processed/
